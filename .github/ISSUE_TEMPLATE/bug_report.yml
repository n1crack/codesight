name: Bug report
description: Report a problem with codesight
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. codesight runs fully offline,
        so please include enough detail to reproduce the issue locally.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it? A sample repo or repo characteristics help.
      placeholder: |
        1. Open repository '...'
        2. Go to '...' page
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: codesight version / commit
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant error output or screenshots.
