<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="824" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F1218"/>
      <stop offset="1" stop-color="#1A1F2C"/>
    </linearGradient>
    <linearGradient id="grad" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CC4FF"/>
      <stop offset="0.55" stop-color="#B39DFF"/>
      <stop offset="1" stop-color="#6EE7A4"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Padded canvas (1024x1024) with macOS-style ~10% transparent margin around an 824x824 visual area. -->
  <g transform="translate(100 100) scale(1.609375)">
    <rect width="512" height="512" rx="112" fill="url(#bg)"/>
    <rect width="512" height="512" rx="112" fill="url(#rim)"/>

    <g stroke="url(#grad)" stroke-width="22" stroke-linecap="round" fill="none">
      <line x1="176" y1="176" x2="336" y2="176"/>
      <line x1="176" y1="176" x2="256" y2="352"/>
      <line x1="336" y1="176" x2="256" y2="352"/>
    </g>

    <circle cx="176" cy="176" r="34" fill="url(#grad)"/>
    <circle cx="336" cy="176" r="34" fill="url(#grad)"/>
    <circle cx="256" cy="352" r="44" fill="url(#grad)"/>
    <circle cx="256" cy="352" r="18" fill="#0F1218"/>
  </g>
</svg>
